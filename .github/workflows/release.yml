name: release

# Build standalone binaries for each platform and publish them to a GitHub
# Release whenever a version tag is pushed, e.g.:
#   git tag v0.1.0 && git push origin v0.1.0
on:
  push:
    tags:
      - "v*"

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      # OpenTUI pulls a native, per-platform package (@opentui/core-<plat>) as
      # an optional dependency — only the host's is installed by `bun install`.
      # So each binary must be built on its native runner; cross-compiling all
      # targets from one Linux runner fails to resolve the native module.
      matrix:
        include:
          - os: ubuntu-latest
            target: bun-linux-x64
            asset: leettui-linux-x64
          - os: macos-14
            target: bun-darwin-arm64
            asset: leettui-macos-arm64
          - os: windows-latest
            target: bun-windows-x64
            asset: leettui-windows-x64.exe
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - run: bun install --frozen-lockfile

      # Embedded migrations (src/db/migrations.ts) ship inside each binary.
      # The pushed tag (github.ref_name) is baked in as the version; IS_RELEASE
      # marks this as an official build so `leettui update` will self-update it
      # (local `bun run build` binaries leave it unset and refuse to self-update).
      #
      # --production sets NODE_ENV=production AND enables minification. Use the
      # flag rather than `--define process.env.NODE_ENV="production"`: a raw
      # define makes React resolve to its production jsx-dev-runtime (which stubs
      # `jsxDEV = void 0`) WITHOUT switching Bun's JSX transform off the dev
      # `jsxDEV(...)` form, so the binary calls undefined and crashes at the
      # first render ("X is not a function"). --production flips both together.
      #
      # The second entry point (node_modules/@opentui/core/parser.worker.js)
      # bundles OpenTUI's tree-sitter highlight worker — and its web-tree-sitter
      # dependency + engine wasm — into the binary so <markdown> descriptions are
      # syntax-highlighted; src/core/treeSitterWorker.ts points OpenTUI at the
      # embedded copy. Without it the worker can't resolve its deps at runtime
      # and every description renders flat. Keep in sync with scripts/build.ts.
      - name: Build ${{ matrix.asset }}
        run: bun build ./src/index.tsx ./node_modules/@opentui/core/parser.worker.js --compile --production --target=${{ matrix.target }} --define 'process.env.LEETTUI_VERSION="${{ github.ref_name }}"' --define 'process.env.LEETTUI_IS_RELEASE="1"' --outfile ${{ matrix.asset }}

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}
          path: ${{ matrix.asset }}
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      # Stage 19: ship a gzip sibling of each self-updatable asset so install.sh
      # + src/core/update.ts can fetch a ~half-size payload. Done here (one
      # ubuntu runner with GNU gzip) rather than per-build-matrix so there's a
      # single gzip step and no macOS `gzip -k` portability concern. Purely
      # additive — the raw binaries stay attached, so pre-Stage-19 clients (whose
      # update.ts only knows the raw asset name) keep self-updating; the raw
      # asset can be retired in a later stage once .gz-aware clients dominate.
      # Windows (.exe) has no install/self-update path, so it stays raw.
      - name: gzip self-updatable assets
        run: |
          gzip -9 -c dist/leettui-linux-x64 > dist/leettui-linux-x64.gz
          gzip -9 -c dist/leettui-macos-arm64 > dist/leettui-macos-arm64.gz

      - uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
